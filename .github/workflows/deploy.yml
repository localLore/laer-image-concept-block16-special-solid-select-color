name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache lore-pages
        id: cache-lore
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/lore-pages
          key: lore-pages-v0.4.2

      - name: Download lore-pages
        if: steps.cache-lore.outputs.cache-hit != 'true'
        run: |
          sudo curl -L https://github.com/dotCorain/lore-pages/releases/download/v0.4.2/lore-pages -o /usr/local/bin/lore-pages
          sudo chmod +x /usr/local/bin/lore-pages

      - name: Build site
        run: lore-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
